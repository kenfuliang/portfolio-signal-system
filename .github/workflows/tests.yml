name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          # pure-logic tests only — no LEAN/Docker needed
          pip install pyyaml pandas numpy pytest
      - name: Run tests
        run: pytest -q
